commit-msg:
  commands:
    lint-commit-msg:
      run: npx --yes commitlint --edit
pre-commit:
  parallel: true
  commands:
    format:
      tags: style
      run: npm run format:fix && git add {staged_files}
    test:
      tags: test
      run: npm run test
pre-push:
  parallel: true
  commands:
    secrets-audit:
      tags: security audit
      use_stdin: true
      run: talisman --githook pre-push
